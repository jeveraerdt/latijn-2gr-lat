<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grieks — athena Campus Pottelberg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lufga:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blauw: #13427f; --roze: #E6007E; --paars: #6d28d9;
    --fv: 'Lufga', Arial, sans-serif; --fo: 'Aptos', Arial, sans-serif;
    --achtergrond: #f7f8fa; --kaart: #ffffff; --rand: #e2e6ed;
    --tekst: #1a1a1a; --tekst-zacht: #6b7280;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--fv); background: var(--achtergrond); color: var(--tekst); min-height: 100vh; display: flex; flex-direction: column; }

  .hero { width: 100%; position: relative; min-height: auto; background: transparent; flex-shrink: 0; }
  .hero-inhoud { position: relative; z-index: 1; padding: 3.5rem 2rem 3rem; text-align: center; }
  .hero h1 { font-size: 38px; font-weight: 600; color: var(--blauw); letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 5px; }
  .hero h1 .accent { color: #f9a8d4; }
  .hero .ondertitel { font-size: 13px; color: var(--blauw); font-family: var(--fo); letter-spacing: 0.3px; }
  .school-logo { width: 44px; height: auto; margin-top: 10px; opacity: 0.9; display: block; margin-left: auto; margin-right: auto; }

  .terug-wrap { padding: 1.25rem 2rem 0; max-width: 1100px; width: 100%; margin: 0 auto; }
  .terug-link { font-size: 12px; color: var(--tekst-zacht); text-decoration: none; }
  .terug-link:hover { color: var(--blauw); }

  .nav-wrap { flex: 1; padding: 1.5rem 2rem 3rem; max-width: 1100px; width: 100%; margin: 0 auto; }
  .nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
  .nav-tegel { background: var(--kaart); border: 0.5px solid var(--rand); border-radius: var(--radius); padding: 1.5rem 1.25rem; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 10px; transition: border-color 0.15s, transform 0.15s; }
  .nav-tegel:hover { border-color: var(--paars); transform: translateY(-2px); }
  .nav-tegel-icoon { width: 42px; height: 42px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .nav-tegel-icoon svg { width: 22px; height: 22px; }
  .icoon-paars { background: #ede7f6; }
  .icoon-blauw { background: #e6f0fb; }
  .icoon-groen { background: #e8f5e9; }
  .icoon-roze  { background: #fce8f3; }
  .nav-tegel-naam { font-size: 15px; font-weight: 600; color: var(--paars); }
  .nav-tegel-omschrijving { font-family: var(--fo); font-size: 13px; color: var(--tekst-zacht); line-height: 1.5; }
  .nav-tegel-pijl { margin-top: auto; font-size: 18px; color: var(--rand); transition: color 0.15s; }
  .nav-tegel:hover .nav-tegel-pijl { color: var(--paars); }

  .voet { text-align: center; padding: 1rem; font-family: var(--fo); font-size: 12px; color: #c0c8d4; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inhoud">
    <h1>Grieks <span class="accent">2GR</span></h1>
    <p class="ondertitel">athena Campus Pottelberg</p>
    <img class="school-logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAHAAAABZCAYAAADmQ6C1" alt="athena" />
  </div>
</div>

<div class="terug-wrap">
  <a class="terug-link" href="index.html">&#8592; Terug naar home</a>
</div>

<div class="nav-wrap">
  <div class="nav-grid">
    <!-- navigatietegels blijven hier identiek aan origineel -->
  </div>
</div>

<footer class="voet">© athena Campus Pottelberg</footer>
</body>
</html>
