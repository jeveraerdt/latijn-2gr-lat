<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latijn — 2GR-LAT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lufga:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blauw: #13427f; --roze: #E6007E;
    --fv: 'Lufga', Arial, sans-serif; --fo: 'Aptos', Arial, sans-serif;
    --achtergrond: #f7f8fa; --kaart: #ffffff; --rand: #e2e6ed;
    --tekst: #1a1a1a; --tekst-zacht: #6b7280;
    --groen: #2a7a2a; --groen-bg: #f0faf0;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--fv); background: var(--achtergrond); color: var(--tekst); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  .naam-blok { background: var(--kaart); border: 0.5px solid var(--rand); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1.75rem; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .naam-label { font-size: 13px; color: var(--tekst-zacht); white-space: nowrap; }
  .naam-veld { font-family: var(--fv); font-size: 14px; font-weight: 500; color: var(--blauw); border: 0.5px solid var(--rand); border-radius: var(--radius-sm); padding: 7px 12px; background: #f9fafb; outline: none; flex: 1; min-width: 160px; transition: border-color 0.15s; }
  .naam-veld:focus { border-color: var(--blauw); background: #fff; }
  .naam-opgeslagen { font-size: 12px; color: var(--groen); display: none; }
  .header { padding-bottom: 1.25rem; border-bottom: 2px solid var(--blauw); margin-bottom: 2rem; }
  .header h1 { font-size: 26px; font-weight: 600; color: var(--blauw); letter-spacing: -0.5px; }
  .header p { font-size: 13px; color: var(--tekst-zacht); margin-top: 4px; }
  .stats-rij { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 2rem; }
  .stat-kaart { background: var(--kaart); border: 0.5px solid var(--rand); border-radius: var(--radius-sm); padding: 1rem; text-align: center; }
  .stat-getal { font-size: 28px; font-weight: 600; color: var(--blauw); display: block; }
  .stat-label { font-size: 12px; color: var(--tekst-zacht); margin-top: 2px; }
  .sectie { margin-bottom: 2rem; }
  .sectie-titel { font-size: 11px; font-weight: 500; color: var(--blauw); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 0.75rem; padding-bottom: 4px; border-bottom: 0.5px solid var(--rand); }
  .oefening-kaart { background: var(--kaart); border: 0.5px solid var(--rand); border-radius: var(--radius); padding: 0.875rem 1.125rem; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit; transition: border-color 0.15s; }
  .oefening-kaart:hover { border-color: var(--blauw); }
  .status-cirkel { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .status-gedaan { background: var(--groen-bg); color: var(--groen); }
  .status-open { background: #f3f4f6; border: 1.5px dashed #d1d5db; }
  .oefening-info { flex: 1; min-width: 0; }
  .oefening-naam { font-size: 14px; font-weight: 500; color: var(--blauw); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .oefening-meta { font-family: var(--fo); font-size: 12px; color: var(--tekst-zacht); margin-top: 2px; }
  .progress-wrap { background: #f3f4f6; border-radius: 99px; height: 5px; margin-top: 6px; overflow: hidden; }
  .progress-vul { height: 100%; border-radius: 99px; background: var(--roze); }
  .score-badge { font-family: var(--fo); font-size: 13px; font-weight: 500; color: var(--roze); flex-shrink: 0; }
  .score-leeg { font-size: 18px; color: #d1d5db; flex-shrink: 0; }
  .niveau-kransen { display: flex; align-items: center; gap: 1px; flex-shrink: 0; margin-right: 4px; }
  .niveau-kransen img { width: 18px; height: 18px; opacity: 1; }
  .niveau-kransen img.grijs { opacity: 0.18; filter: grayscale(1); }
  .knop-rij { display: flex; gap: 10px; margin-top: 0.75rem; flex-wrap: wrap; }
  .knop { font-family: var(--fv); font-size: 12px; padding: 7px 14px; border-radius: var(--radius-sm); cursor: pointer; border: 0.5px solid var(--rand); background: transparent; color: var(--tekst-zacht); transition: background 0.12s; }
  .knop:hover { background: #f3f4f6; border-color: #9ca3af; }
  .knop-insturen { background: var(--blauw); color: #fff; border-color: var(--blauw); font-weight: 500; }
  .knop-insturen:hover { background: #0f3568; border-color: #0f3568; }
  .instuur-info { font-size: 12px; color: var(--tekst-zacht); margin-top: 8px; font-family: var(--fo); }
  .legenda { display: flex; align-items: center; gap: 18px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .legenda-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--tekst-zacht); font-family: var(--fo); }
  .legenda-item img { width: 16px; height: 16px; }
</style>
</head>

const FORMULIER_ID    = '1FAIpQLScCEJFq3G9kw1DsRpeq90hTpsSuVbCs7FMFh1bzOIXKBIKvIQ';
const VELD_NAAM       = 'entry.825151788';
const VELD_RESULTATEN = 'entry.1977566684';
const OPSLAG_SLEUTEL  = 'latijn-2grLAT';
const NAAM_SLEUTEL    = 'latijn-2grLAT-naam';

const OEFENINGEN = [
  { id: 'aci-1',    sectie: 'ACI',              naam: 'ACI — herkenning',             bestand: null,                 vragen: 10, niveau: 1 },
  { id: 'aci-2',    sectie: 'ACI',              naam: 'ACI — vertaling',              bestand: 'aci-vertaling.html', vragen: 4,  niveau: 2 },
  { id: 'aci-3',    sectie: 'ACI',              naam: 'ACI — constructie',            bestand: null,                 vragen: 6,  niveau: 3 },
  { id: 'tijden-1', sectie: 'Werkwoordstijden', naam: 'Perfectum — vormen',           bestand: null,                 vragen: 12, niveau: 1 },
  { id: 'tijden-2', sectie: 'Werkwoordstijden', naam: 'Imperfectum — vormen',         bestand: null,                 vragen: 12, niveau: 1 },
  { id: 'tijden-3', sectie: 'Werkwoordstijden', naam: 'Tijden — vergelijking',        bestand: null,                 vragen: 8,  niveau: 2 },
  { id: 'bij-1',    sectie: 'Bijzinnen',        naam: 'Indirecte vraagzin',           bestand: null,                 vragen: 10, niveau: 2 },
  { id: 'bij-2',    sectie: 'Bijzinnen',        naam: 'Ut/ne-zin',                    bestand: null,                 vragen: 8,  niveau: 2 },
  { id: 'bij-3',    sectie: 'Bijzinnen',        naam: 'Aanvullende bijzin — gemengd', bestand: null,                 vragen: 10, niveau: 3 },
  { id: 'naamv-1',  sectie: 'Naamvallen',       naam: 'Nominatief & accusatief',      bestand: null,                 vragen: 10, niveau: 1 },
  { id: 'naamv-2',  sectie: 'Naamvallen',       naam: 'Genitief & datief',            bestand: null,                 vragen: 10, niveau: 2 },
];

function kransenHTML(niveau) {
  let html = '<div class="niveau-kransen">';
  for (let i = 1; i <= 3; i++) {
    html += `<img src="${KRANS_SRC}" class="${i <= niveau ? '' : 'grijs'}" alt="" />`;
  }
  html += '</div>';
  return html;
}

function laadVoortgang() {
  try { return JSON.parse(localStorage.getItem(OPSLAG_SLEUTEL) || '{}'); } catch(e) { return {}; }
}
function updateInstuurInfo() {
  const naam = document.getElementById('naam-veld').value.trim();
  document.getElementById('instuur-info').textContent = naam
    ? 'Klik op "Resultaten insturen" om je voortgang door te sturen naar de leerkracht.'
    : 'Vul eerst je naam in voor je instuurt.';
}
function slaaNaamOp(naam) {
  localStorage.setItem(NAAM_SLEUTEL, naam);
  const label = document.getElementById('naam-opgeslagen');
  label.style.display = 'inline';
  setTimeout(() => { label.style.display = 'none'; }, 1500);
  updateInstuurInfo();
}
function stuurResultatenIn() {
  const naam = document.getElementById('naam-veld').value.trim();
  if (!naam) { alert('Vul eerst je naam in.'); document.getElementById('naam-veld').focus(); return; }
  const vg = laadVoortgang();
  const regels = OEFENINGEN.filter(o => vg[o.id]).map(o => {
    const r = vg[o.id];
    const pct = Math.round((r.score / r.max) * 100);
    const datum = new Date(r.datum).toLocaleDateString('nl-BE', { day: 'numeric', month: 'long' });
    return `${o.naam}: ${r.score}/${r.max} (${pct}%) — ${datum}`;
  });
  if (regels.length === 0) { alert('Je hebt nog geen oefeningen gemaakt.'); return; }
  const url = `https://docs.google.com/forms/d/e/${FORMULIER_ID}/viewform?usp=pp_url&${VELD_NAAM}=${encodeURIComponent(naam)}&${VELD_RESULTATEN}=${encodeURIComponent(regels.join('\n'))}`;
  window.open(url, '_blank');
}
function resetVoortgang() {
  if (confirm('Wis je volledige voortgang? Dit kan niet ongedaan gemaakt worden.')) {
    localStorage.removeItem(OPSLAG_SLEUTEL);
    renderDashboard();
  }
}
function renderDashboard() {
  const vg = laadVoortgang();
  const totaal = OEFENINGEN.length;
  const gedaan = OEFENINGEN.filter(o => vg[o.id]).length;
  const scores = OEFENINGEN.filter(o => vg[o.id]).map(o => Math.round((vg[o.id].score / vg[o.id].max) * 100));
  const gemiddeld = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : 0;
  document.getElementById('stats-rij').innerHTML = `
    <div class="stat-kaart"><span class="stat-getal">${gedaan}/${totaal}</span><span class="stat-label">oefeningen gemaakt</span></div>
    <div class="stat-kaart"><span class="stat-getal">${Math.round((gedaan/totaal)*100)}%</span><span class="stat-label">voltooid</span></div>
    <div class="stat-kaart"><span class="stat-getal">${scores.length ? gemiddeld+'%' : '—'}</span><span class="stat-label">gemiddelde score</span></div>
  `;
  const secties = [...new Set(OEFENINGEN.map(o => o.sectie))];
  let html = '';
  for (const sectie of secties) {
    const items = OEFENINGEN.filter(o => o.sectie === sectie);
    const gedaanInSectie = items.filter(o => vg[o.id]).length;
    html += `<div class="sectie"><div class="sectie-titel">${sectie} <span style="font-weight:400;opacity:0.6">${gedaanInSectie}/${items.length}</span></div>`;
    for (const o of items) {
      const res = vg[o.id];
      const pct = res ? Math.round((res.score / res.max) * 100) : 0;
      const datumStr = res ? new Date(res.datum).toLocaleDateString('nl-BE', { day: 'numeric', month: 'long' }) : '';
      const tag = o.bestand ? 'a' : 'div';
      const href = o.bestand ? `href="${o.bestand}"` : '';
      html += `<${tag} class="oefening-kaart" ${href} ${!o.bestand ? 'style="cursor:default"' : ''}>
        <div class="status-cirkel ${res ? 'status-gedaan' : 'status-open'}">${res ? '\u2713' : ''}</div>
        <div class="oefening-info">
          <div class="oefening-naam">${o.naam}${!o.bestand ? ' <span style="font-size:11px;color:#d1d5db;font-weight:400">(binnenkort)</span>' : ''}</div>
          <div class="oefening-meta">${res ? datumStr+' · '+o.vragen+' vragen' : o.vragen+' vragen'}</div>
          ${res ? `<div class="progress-wrap"><div class="progress-vul" style="width:${pct}%"></div></div>` : ''}
        </div>
        ${kransenHTML(o.niveau)}
        ${res ? `<span class="score-badge">${res.score}/${res.max}</span>` : `<span class="score-leeg">›</span>`}
      </${tag}>`;
    }
    html += '</div>';
  }
  document.getElementById('secties-container').innerHTML = html;
  document.getElementById('datum-label').textContent =
    new Date().toLocaleDateString('nl-BE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}
const naamVeld = document.getElementById('naam-veld');
naamVeld.value = localStorage.getItem(NAAM_SLEUTEL) || '';
naamVeld.addEventListener('change', () => slaaNaamOp(naamVeld.value.trim()));
naamVeld.addEventListener('input', updateInstuurInfo);
updateInstuurInfo();
renderDashboard();
</script>
