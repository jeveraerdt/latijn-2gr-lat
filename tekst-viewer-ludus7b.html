<html lang="nl">
<head>
<meta charset="UTF-8">

<title>Tekst 4 – Vaderlandsliefde boven vaderliefde · athena</title>
<link href="https://fonts.googleapis.com/css2?family=Lufga:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="_theme.css">
<style>
:root {
  --blue:#13427f; --blue-mid:#1a5299; --magenta:#E6007E;
  --bg:#f5f3ef; --paper:#fffef9; --ink:#1c1a16; --ink-mid:#3d3a34;
  --ink-light:#7a7168; --rule:#ddd8d0;
  --green:#2d7a3a; --green-bg:#e8f5eb;
  --orange:#c05a00; --orange-bg:#fff0e0;
  --purple:#6a1a8a; --purple-bg:#f3e8fb;
  --hl:#fff3c4; --hl-b:#e8c840;
  --lh:2.3; --fs:1.18rem;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'EB Garamond',Georgia,serif;color:var(--ink);min-height:100vh;overflow-x:hidden;}


/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;background:#f0f3f8;display:flex;align-items:center;justify-content:space-between;padding:0 1.75rem;height:54px;box-shadow:0 1px 0 rgba(19,66,127,.1),0 2px 12px rgba(19,66,127,.07);}
.topbar-left{display:flex;align-items:center;gap:.75rem;}
.back-btn{background:none;border:none;color:var(--blue);font-family:'Lufga',sans-serif;font-size:.76rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:.4rem;padding:.3rem 0;transition:color .15s;letter-spacing:.02em;}
.back-btn:hover{color:var(--magenta);}
.back-btn svg{width:13px;height:13px;}
.topbar-divider{width:1px;height:18px;background:rgba(19,66,127,.15);}
.topbar-label{font-family:'Lufga',sans-serif;font-size:.72rem;font-weight:500;color:rgba(19,66,127,.45);letter-spacing:.1em;text-transform:uppercase;}
.topbar-controls{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.ctrl-btn{background:#fff;border:1.5px solid rgba(19,66,127,.18);border-radius:20px;color:var(--blue);font-family:'Lufga',sans-serif;font-size:.7rem;font-weight:600;padding:.3rem .85rem;cursor:pointer;transition:all .15s;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:.3rem;white-space:nowrap;}
.ctrl-btn:hover{border-color:var(--magenta);color:var(--magenta);background:#fff;}
.ctrl-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.ctrl-btn svg{width:12px;height:12px;flex-shrink:0;}
