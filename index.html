<style>
  :root {
    --blauw: #13427f; --roze: #E6007E;
    --fv: 'Lufga', Arial, sans-serif; --fo: 'Aptos', Arial, sans-serif;
    --achtergrond: #f7f8fa; --kaart: #ffffff; --rand: #e2e6ed;
    --tekst: #1a1a1a; --tekst-zacht: #6b7280;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--fv); background: var(--achtergrond); color: var(--tekst); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }

  .logo-wrap { margin-bottom: 1.75rem; text-align: center; }
  .school-logo { width: 56px; height: auto; display: block; margin: 0 auto 0.75rem; }
  .site-titel { font-size: 13px; color: var(--tekst-zacht); font-family: var(--fo); letter-spacing: 0.3px; }

  .keuze-titel { font-size: 28px; font-weight: 600; color: var(--blauw); text-align: center; margin-bottom: 0.4rem; letter-spacing: -0.5px; }
  .keuze-subtitel { font-size: 14px; color: var(--tekst-zacht); font-family: var(--fo); text-align: center; margin-bottom: 2.5rem; }

  .taal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.25rem; width: 100%; max-width: 580px; margin-bottom: 2rem; }

  .taal-kaart { background: var(--kaart); border: 0.5px solid var(--rand); border-radius: var(--radius); padding: 2rem 1.5rem; text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; transition: border-color 0.15s, transform 0.15s; }
  .taal-kaart.latijn:hover { border-color: var(--blauw); transform: translateY(-3px); }
  .taal-kaart.grieks:hover { border-color: var(--roze); transform: translateY(-3px); }

  .taal-icoon { width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; }
  .taal-icoon img { width: 72px; height: auto; }

  .taal-naam { font-size: 20px; font-weight: 600; }
  .taal-kaart.latijn .taal-naam { color: var(--blauw); }
  .taal-kaart.grieks .taal-naam { color: var(--roze); }
  .taal-omschrijving { font-family: var(--fo); font-size: 13px; color: var(--tekst-zacht); line-height: 1.5; }
  .taal-pijl { font-size: 20px; color: var(--rand); transition: color 0.15s; }
  .taal-kaart.latijn:hover .taal-pijl { color: var(--blauw); }
  .taal-kaart.grieks:hover .taal-pijl { color: var(--roze); }

  .voet { font-family: var(--fo); font-size: 12px; color: #c0c8d4; text-align: center; }
</style>
